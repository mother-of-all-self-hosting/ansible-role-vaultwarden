---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml
driver:
  name: docker
platforms:
  - name: vaultwarden-${MOLECULE_DISTRO:-ubuntu2604}-default
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-ubuntu2604}-ansible:latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  config_options:
    defaults:
      callback_result_format: yaml
  inventory:
    group_vars:
      all:
        # Helper variables
        vaultwarden_debug_service_enabled: false

        # Variables for Vaultwarden
        vaultwarden_uid: 1000
        vaultwarden_gid: 1000
        vaultwarden_scheme: http
        vaultwarden_hostname: localhost
        vaultwarden_container_labels_traefik_enabled: false
        vaultwarden_container_http_host_bind_port: 8080
        vaultwarden_database_type: mysql

        # Variables required for Vaultwarden to connect to the MariaDB database (via Unix socket)
        vaultwarden_database_mysql_username: my_database_username
        vaultwarden_database_mysql_password: my_database_password
        vaultwarden_database_name: vaultwarden
        vaultwarden_database_mysql_socket_enabled: true
        vaultwarden_database_mysql_socket_path_host: "{{ mariadb_run_path }}"
        vaultwarden_systemd_required_services_list_auto: |
          {{
            (['mariadb.service'])
          }}

        # Variables for MariaDB
        mariadb_uid: 1000
        mariadb_gid: 1000
        mariadb_root_password: mariadb_password
        mariadb_container_unix_socket_enabled: true
        mariadb_managed_databases: |
          {{
            [{
              'name': vaultwarden_database_name,
              'username': vaultwarden_database_mysql_username,
              'password': vaultwarden_database_mysql_password,
            }]
          }}
  env:
    # Workaround for https://github.com/ansible/molecule/issues/4391
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/..:/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles:~/.ansible/roles
scenario:
  # See: https://docs.ansible.com/projects/molecule/configuration/?h=test_sequence#scenario
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    # Disable idempotence test for now due to ansible-role-mariadb
    # - idempotence
    - side_effect
    - verify
    - cleanup
    - destroy
verifier:
  name: ansible
